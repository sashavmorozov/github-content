<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c81"/>
      <stop offset="100%" style="stop-color:#1b6fb5"/>
    </linearGradient>
  </defs>
  <!-- Three-star constellation mark (Orion's Belt) -->
  <circle cx="32" cy="38" r="6" fill="#0f4c81"/>
  <circle cx="50" cy="52" r="8" fill="url(#starGrad)"/>
  <circle cx="68" cy="38" r="6" fill="#0f4c81"/>
  <!-- Connecting lines between stars -->
  <line x1="37" y1="40" x2="43" y2="48" stroke="#0f4c81" stroke-width="1.5" opacity="0.5"/>
  <line x1="57" y1="48" x2="63" y2="40" stroke="#0f4c81" stroke-width="1.5" opacity="0.5"/>
  <!-- Outer orbit arc -->
  <path d="M 20 60 Q 50 78 80 60" fill="none" stroke="#e8792f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Globe/network lines under constellation -->
  <ellipse cx="50" cy="72" rx="28" ry="10" fill="none" stroke="#0f4c81" stroke-width="1" opacity="0.3"/>
  <!-- Company name -->
  <text x="100" y="52" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#0f4c81" letter-spacing="1">ORION</text>
  <text x="100" y="80" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5a6a7a" letter-spacing="4">LOGISTICS</text>
  <!-- Subtle tagline -->
  <text x="100" y="100" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#8a9aaa" letter-spacing="2">GLOBAL CONNECTIVITY SOLUTIONS</text>
</svg>
