<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- IP block grid -->
  <rect x="55" y="45" width="90" height="25" rx="4" fill="none" stroke="#4fd1c5" stroke-width="2"/>
  <rect x="55" y="75" width="90" height="25" rx="4" fill="none" stroke="#4fd1c5" stroke-width="2"/>
  <rect x="55" y="105" width="43" height="25" rx="4" fill="#4fd1c5" fill-opacity="0.3" stroke="#4fd1c5" stroke-width="2"/>
  <rect x="102" y="105" width="43" height="25" rx="4" fill="none" stroke="#4fd1c5" stroke-width="2"/>
  <!-- IP text -->
  <text x="100" y="63" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">192.168.1.0</text>
  <text x="100" y="93" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">192.168.1.1</text>
  <text x="76" y="123" text-anchor="middle" fill="#4fd1c5" font-family="monospace" font-size="11">.2</text>
  <text x="123" y="123" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">.3</text>
  <!-- Label -->
  <text x="100" y="158" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Public IP Rental</text>
  <text x="100" y="175" text-anchor="middle" fill="#a0aec0" font-family="Arial, sans-serif" font-size="10">IPv4 Block + BGP</text>
</svg>